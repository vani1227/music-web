<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎧 Music Web App</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #0a0f24, #1b264f);
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    header h1 {
      font-size: 2.3em;
      color: #00eaff;
      text-shadow: 0 0 15px rgba(0, 234, 255, 0.4);
      margin-bottom: 10px;
    }

    .player {
      margin-top: 30px;
    }

    audio {
      width: 80%;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .disk {
      width: 200px;
      height: 200px;
      margin: 20px auto;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #1e293b 40%, #0f172a 100%);
      box-shadow: 0 0 25px rgba(0, 234, 255, 0.3);
      position: relative;
    }

    .disk img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      animation: spin 3s linear infinite;
      animation-play-state: paused;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .speed-controls button {
      background: #00bcd4;
      border: none;
      color: #fff;
      padding: 8px 14px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .speed-controls button:hover {
      background: #00eaff;
      transform: scale(1.05);
    }

    #uploadsContainer {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .song-item {
      background: #1e293b;
      padding: 15px 25px;
      border-radius: 12px;
      margin: 10px;
      width: 65%;
      box-shadow: 0 0 10px rgba(0, 234, 255, 0.1);
      transition: all 0.3s;
    }

    .song-item:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0, 234, 255, 0.3);
    }

    .song-item p {
      font-size: 1.1em;
      margin-bottom: 8px;
    }

    .song-item button {
      background: #00bcd4;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .song-item button:hover {
      background: #00eaff;
    }

    .subscription {
      margin-top: 35px;
      font-size: 1.2em;
      color: #00ffcc;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 200, 0.3);
    }

    .upload-btn {
      margin-top: 25px;
      background: #00bcd4;
      border: none;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1em;
    }

    .upload-btn:hover {
      background: #00eaff;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="navbarContainer"></div>

<script>
  // Load navbar.html into the page dynamically
  fetch("navbar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbarContainer").innerHTML = data;
    });
</script>

  <header>
    <h1>🎵 Welcome to Music World</h1>
  </header>

  <main>
    <section class="player">
      <audio id="audioPlayer" controls>
        <source src="songs/sample.mp3" type="audio/mp3">
      </audio>

      <div class="disk">
        <img src="disk.png" alt="Disk" id="diskImage">
      </div>

      <div class="speed-controls">
        <button onclick="changeSpeed(0.5)">0.5x</button>
        <button onclick="changeSpeed(1)">1x</button>
        <button onclick="changeSpeed(1.5)">1.5x</button>
        <button onclick="changeSpeed(2)">2x</button>
      </div>
    </section>

    <section class="likes">
      <h2>🔥 Uploaded Songs</h2>
      <div id="uploadsContainer"></div>
      <button class="upload-btn" onclick="window.location.href='upload.html'">⬆️ Upload a Song</button>
    </section>

    <section class="subscription">
      <h3 id="subscriptionStatus">💎 Subscription: Not Active</h3>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
