<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎤 Upload Your Song</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #0a0f24, #1b264f);
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 40px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    header h1 {
      font-size: 2.5em;
      color: #00eaff;
      text-shadow: 0 0 20px rgba(0, 234, 255, 0.5);
      margin-bottom: 20px;
    }

    form {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px 40px;
      border-radius: 18px;
      box-shadow: 0 0 25px rgba(0, 234, 255, 0.2);
      width: 90%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s;
    }

    form:hover {
      transform: scale(1.03);
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      margin: 10px 0;
      padding: 12px 15px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 1em;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    input::file-selector-button {
      background: #00bcd4;
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }

    input::file-selector-button:hover {
      background: #00eaff;
    }

    button {
      background: #00eaff;
      border: none;
      color: #fff;
      padding: 12px 25px;
      border-radius: 10px;
      font-size: 1.1em;
      margin-top: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #00bcd4;
      transform: scale(1.05);
    }

    #uploadMessage {
      margin-top: 20px;
      font-weight: bold;
      color: #00ff90;
      font-size: 1.1em;
      text-shadow: 0 0 10px rgba(0, 255, 144, 0.3);
    }

    footer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #b0e0e6;
    }
  </style>
</head>
<body>
  <div id="navbarContainer"></div>

<script>
  // Load navbar.html into the page dynamically
  fetch("navbar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbarContainer").innerHTML = data;
    });
</script>

  <header>
    <h1>🎵 Upload Your Song</h1>
  </header>

  <main>
    <form id="uploadForm">
      <input type="text" id="title" placeholder="Song Title" required />
      <input type="text" id="bgmUsed" placeholder="BGM Used" required />
      <input type="file" id="file" accept="audio/*" required />
      <button type="submit">Upload</button>
    </form>

    <p id="uploadMessage"></p>
  </main>

  <footer>🎧 Music Web App © 2025</footer>

  <script>
    const apiBase = "http://localhost:5000/api";

    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const title = document.getElementById("title").value;
      const bgmUsed = document.getElementById("bgmUsed").value;
      const file = document.getElementById("file").files[0];
      const uploadMessage = document.getElementById("uploadMessage");

      if (!file) {
        uploadMessage.textContent = "Please select a file.";
        uploadMessage.style.color = "red";
        return;
      }

      const formData = new FormData();
      formData.append("title", title);
      formData.append("bgmUsed", bgmUsed);
      formData.append("file", file);

      uploadMessage.textContent = "⏳ Uploading...";
      uploadMessage.style.color = "#00eaff";

      try {
        const res = await fetch(`${apiBase}/uploads`, {
          method: "POST",
          body: formData,
        });

        if (res.ok) {
          uploadMessage.textContent = "✅ Song uploaded successfully!";
          uploadMessage.style.color = "#00ff90";

          // Wait for 2 seconds then redirect
          setTimeout(() => {
            window.location.href = "index.html";
          }, 2000);
        } else {
          uploadMessage.textContent = "❌ Upload failed. Try again.";
          uploadMessage.style.color = "red";
        }
      } catch (err) {
        console.error(err);
        uploadMessage.textContent = "⚠️ Error connecting to server.";
        uploadMessage.style.color = "red";
      }
    });
  </script>
</body>
</html>
